<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>New API</title>
    <meta name="title" content="New API" />
    <!--
      Apply the cached system name synchronously, before the app bundle loads,
      so a custom site name does not flash the default "New API" on refresh.
      "New API" stays as the static default for first-ever visits / no cache.
    -->
    <script>
      (function () {
        try {
          var name = '';
          var status = localStorage.getItem('status');
          if (status) {
            var s = JSON.parse(status);
            if (s && s.system_name) name = s.system_name;
          }
          if (!name) {
            var cfg = localStorage.getItem('system-config-storage');
            if (cfg) {
              var c = JSON.parse(cfg);
              if (c && c.state && c.state.config && c.state.config.systemName) {
                name = c.state.config.systemName;
              }
            }
          }
          if (name) {
            document.title = name;
            var meta = document.querySelector('meta[name="title"]');
            if (meta) meta.setAttribute('content', name);
          }
        } catch (e) {
          /* ignore */
        }
      })();
    </script>
    <meta
      name="description"
      content="Unified AI API gateway and admin dashboard."
    />

    <meta name="theme-color" content="#fff" />
    <!--umami-->
    <!--Google Analytics-->

    <!--
      First-paint loading screen. Rendered as static HTML/CSS so it appears
      before the JS bundle parses; React replaces #root content on mount,
      which removes it automatically. Pure CSS animations only — no JS.
    -->
    <style>
      .app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #fafafa;
        z-index: 9999;
        overflow: hidden;
      }
      .app-loading__orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.35;
        will-change: transform;
      }
      .app-loading__orb--1 {
        width: 340px;
        height: 340px;
        background: radial-gradient(circle, #d97757 0%, transparent 70%);
        top: -10%;
        right: -8%;
        animation: app-orb-drift-1 8s ease-in-out infinite;
      }
      .app-loading__orb--2 {
        width: 280px;
        height: 280px;
        background: radial-gradient(circle, #5b9fd6 0%, transparent 70%);
        bottom: -8%;
        left: -6%;
        animation: app-orb-drift-2 10s ease-in-out infinite;
      }
      .app-loading__orb--3 {
        width: 200px;
        height: 200px;
        background: radial-gradient(circle, #d4a574 0%, transparent 70%);
        top: 50%;
        left: 60%;
        transform: translate(-50%, -50%);
        animation: app-orb-drift-3 12s ease-in-out infinite;
      }
      .app-loading__center {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        z-index: 2;
      }
      .app-loading__logo-wrap {
        position: relative;
        width: 96px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .app-loading__glow {
        position: absolute;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(217, 119, 87, 0.25) 0%, transparent 70%);
        animation: app-glow-pulse 3s ease-in-out infinite;
      }
      .app-loading__ripple {
        position: absolute;
        inset: -4px;
        border-radius: 50%;
        border: 1px solid rgba(217, 119, 87, 0.2);
        animation: app-ripple-expand 3s ease-out infinite;
      }
      .app-loading__ripple:nth-child(2) {
        animation-delay: 1s;
      }
      .app-loading__ripple:nth-child(3) {
        animation-delay: 2s;
      }
      .app-loading__ring {
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 1.5px solid rgba(0, 0, 0, 0.04);
      }
      .app-loading__ring::after {
        content: '';
        position: absolute;
        inset: -1.5px;
        border-radius: 50%;
        background: conic-gradient(from 0deg, transparent 0%, rgba(217, 119, 87, 0.6) 100%);
        -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 1.5px), #000 calc(100% - 1.5px));
        mask: radial-gradient(farthest-side, transparent calc(100% - 1.5px), #000 calc(100% - 1.5px));
        animation: app-ring-spin 1.2s linear infinite;
      }
      .app-loading__logo {
        position: relative;
        width: 64px;
        height: 64px;
        border-radius: 14px;
        overflow: hidden;
        animation: app-logo-breathe 2.4s ease-in-out infinite;
      }
      .app-loading__logo img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }
      .app-loading__logo::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(
          105deg,
          transparent 40%,
          rgba(255, 255, 255, 0.35) 50%,
          transparent 60%
        );
        animation: app-shimmer 3s ease-in-out infinite;
      }
      .app-loading__dots {
        display: flex;
        gap: 6px;
        margin-top: 36px;
      }
      .app-loading__dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #d97757;
        opacity: 0.3;
        animation: app-dot-pulse 1.2s ease-in-out infinite;
      }
      .app-loading__dot:nth-child(2) {
        animation-delay: 0.15s;
      }
      .app-loading__dot:nth-child(3) {
        animation-delay: 0.3s;
      }
      .app-loading__particles {
        position: absolute;
        inset: 0;
        z-index: 1;
        overflow: hidden;
      }
      .app-loading__particle {
        position: absolute;
        width: 3px;
        height: 3px;
        border-radius: 50%;
        background: rgba(217, 119, 87, 0.3);
        animation: app-particle-float linear infinite;
      }
      .app-loading__particle:nth-child(1) { left: 15%; bottom: -5%; animation-duration: 7s; animation-delay: 0s; width: 2px; height: 2px; }
      .app-loading__particle:nth-child(2) { left: 30%; bottom: -5%; animation-duration: 9s; animation-delay: 1s; width: 4px; height: 4px; opacity: 0.5; }
      .app-loading__particle:nth-child(3) { left: 50%; bottom: -5%; animation-duration: 6s; animation-delay: 2s; }
      .app-loading__particle:nth-child(4) { left: 70%; bottom: -5%; animation-duration: 8s; animation-delay: 0.5s; width: 2px; height: 2px; }
      .app-loading__particle:nth-child(5) { left: 85%; bottom: -5%; animation-duration: 10s; animation-delay: 3s; width: 3px; height: 3px; opacity: 0.4; }
      .app-loading__particle:nth-child(6) { left: 42%; bottom: -5%; animation-duration: 11s; animation-delay: 4s; width: 2px; height: 2px; opacity: 0.3; }
      @media (prefers-color-scheme: dark) {
        .app-loading { background: #111113; }
        .app-loading__orb { opacity: 0.2; }
        .app-loading__ring { border-color: rgba(255, 255, 255, 0.06); }
        .app-loading__ring::after {
          background: conic-gradient(from 0deg, transparent 0%, rgba(217, 119, 87, 0.8) 100%);
        }
        .app-loading__glow {
          background: radial-gradient(circle, rgba(217, 119, 87, 0.2) 0%, transparent 70%);
        }
        .app-loading__ripple { border-color: rgba(217, 119, 87, 0.12); }
        .app-loading__logo { box-shadow: 0 4px 24px rgba(217, 119, 87, 0.25); }
        .app-loading__logo::after {
          background: linear-gradient(105deg, transparent 40%, rgba(255, 255, 255, 0.15) 50%, transparent 60%);
        }
        .app-loading__particle { background: rgba(217, 119, 87, 0.2); }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-loading__orb,
        .app-loading__glow,
        .app-loading__ripple,
        .app-loading__ring::after,
        .app-loading__logo,
        .app-loading__logo::after,
        .app-loading__dot,
        .app-loading__particle {
          animation: none !important;
        }
      }
      @keyframes app-orb-drift-1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(-30px, 20px) scale(1.05); }
        66% { transform: translate(15px, -15px) scale(0.95); }
      }
      @keyframes app-orb-drift-2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(25px, -20px) scale(1.08); }
        66% { transform: translate(-20px, 10px) scale(0.92); }
      }
      @keyframes app-orb-drift-3 {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.35; }
        50% { transform: translate(-45%, -55%) scale(1.1); opacity: 0.2; }
      }
      @keyframes app-glow-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.15); opacity: 0.6; }
      }
      @keyframes app-ripple-expand {
        0% { transform: scale(1); opacity: 0.5; }
        100% { transform: scale(2.8); opacity: 0; }
      }
      @keyframes app-ring-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes app-logo-breathe {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.96); opacity: 0.88; }
      }
      @keyframes app-shimmer {
        0%, 100% { transform: translateX(-120%); }
        50% { transform: translateX(120%); }
      }
      @keyframes app-dot-pulse {
        0%, 100% { opacity: 0.2; transform: scale(0.8); }
        50% { opacity: 0.8; transform: scale(1); }
      }
      @keyframes app-particle-float {
        0% { transform: translateY(0) translateX(0); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(-100vh) translateX(20px); opacity: 0; }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="app-loading">
        <div class="app-loading__orb app-loading__orb--1"></div>
        <div class="app-loading__orb app-loading__orb--2"></div>
        <div class="app-loading__orb app-loading__orb--3"></div>
        <div class="app-loading__particles">
          <div class="app-loading__particle"></div>
          <div class="app-loading__particle"></div>
          <div class="app-loading__particle"></div>
          <div class="app-loading__particle"></div>
          <div class="app-loading__particle"></div>
          <div class="app-loading__particle"></div>
        </div>
        <div class="app-loading__center">
          <div class="app-loading__logo-wrap">
            <div class="app-loading__glow"></div>
            <div class="app-loading__ripple"></div>
            <div class="app-loading__ripple"></div>
            <div class="app-loading__ripple"></div>
            <div class="app-loading__ring"></div>
            <div class="app-loading__logo">
              <img src="/logo.png" alt="" />
            </div>
          </div>
          <div class="app-loading__dots">
            <div class="app-loading__dot"></div>
            <div class="app-loading__dot"></div>
            <div class="app-loading__dot"></div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
